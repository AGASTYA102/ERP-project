spring.application.name=erp
server.port=${PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/erp}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration (Supabase Storage)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=${SUPABASE_BUCKET:erp-uploads}

# Thymeleaf caching for development
spring.thymeleaf.cache=false
