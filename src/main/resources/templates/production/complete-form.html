<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Complete Production - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4">Log Finished Production</h2>
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <form th:action="@{/production/complete}" th:object="${production}" method="post">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{printingDone}">
                    <label class="form-check-label">Printing Done</label>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{corrugationDone}">
                    <label class="form-check-label">Corrugation Done</label>
                </div>
                <div class="mb-3">
                    <label>Total Sheets Used</label><input type="number" step="0.01" class="form-control" th:field="*{totalSheetsUsed}">
                </div>
                <div class="mb-3">
                    <label>Quantity Produced (Final)</label><input type="number" class="form-control" th:field="*{quantityProduced}">
                </div>
                <div class="mb-4">
                    <label>Assigned Delivery Truck Reg. No</label><input type="text" class="form-control" th:field="*{truckNumber}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Complete & Dispatch</button>
            </form>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
