<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">ERP System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div th:fragment="sidebar" class="sidebar col-md-2" sec:authorize="isAuthenticated()">
            <h4 class="brand-text">NEXUS ERP</h4>
            <div sec:authorize="hasRole('GENERAL_MANAGER')">
                <a href="/gm">Dashboard</a>
                <a href="/gm/clients">Clients</a>
                <a href="/gm/products">Products</a>
                <a href="/gm/orders/new">Punch New Order</a>
            </div>
            <div sec:authorize="hasRole('DESIGNER')">
                <a href="/designer">Design Queue</a>
            </div>
            <div sec:authorize="hasRole('PURCHASE_MANAGER')">
                <a href="/purchase">Purchase & Stock</a>
            </div>
            <div sec:authorize="hasRole('PRODUCTION_MANAGER')">
                <a href="/production">Production Board</a>
            </div>
            <div sec:authorize="hasRole('ACCOUNTS')">
                <a href="/accounts">Invoicing</a>
            </div>
            
            <hr style="border-color: #495057; margin: 2rem 15px;">
            <div style="padding: 0 15px; color: #7aa2f7;">
                <small>Logged in as: <span sec:authentication="name"></span></small>
            </div>
            <form th:action="@{/logout}" method="post" class="mt-3 text-center">
                <button type="submit" class="btn btn-outline-light btn-sm w-75">Logout</button>
            </form>
        </div>
        
    </div>
    
    <script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
