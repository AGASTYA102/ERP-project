<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Process Purchase - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4">Process Material Check</h2>
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <form th:action="@{/purchase/process}" method="post">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <div class="mb-3">
                    <label>Material Name</label><input type="text" class="form-control" name="materialName" required>
                </div>
                <div class="mb-4">
                    <label>Required Quantity</label><input type="number" step="0.01" class="form-control" name="requiredQty" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Check & Deduct / Raise PO</button>
            </form>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
