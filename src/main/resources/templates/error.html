<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4 text-danger">An Error Occurred</h2>
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage != null ? errorMessage : (message != null ? message : 'An unexpected system error occurred.')}">An unexpected error occurred.</span>
                <p class="mb-0 mt-2 small text-danger" th:if="${status != null}" th:text="'Error Code: ' + ${status} + ' - ' + ${error}"></p>
            </div>
            <div class="mt-4 text-center">
                <button type="button" class="btn btn-secondary w-100" onclick="history.back()">Go Back</button>
            </div>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
