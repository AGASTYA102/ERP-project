<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Generate Invoice - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4">Generate Invoice</h2>
        <div class="card p-4 mx-auto mb-4" style="max-width: 800px;">
            <h5 class="border-bottom pb-2 mb-3">Order Summary for Billing #<span th:text="${order.id}"></span></h5>
            <div class="row small mb-3">
                <div class="col-md-4">
                    <h6>Order Info</h6>
                    <p><strong>Client:</strong> <span th:text="${order.client.name}"></span></p>
                    <p><strong>Product:</strong> <span th:text="${order.product.name}"></span></p>
                    <p><strong>Quantity:</strong> <span th:text="${order.quantity}"></span></p>
                </div>
                <div class="col-md-4 border-start">
                    <h6>Product Specs</h6>
                    <p><strong>Top Ply:</strong> <span th:text="${order.product.topPlyMaterial ?: 'N/A'}"></span></p>
                    <p><strong>Rest Ply:</strong> <span th:text="${order.product.restPlySpecs ?: 'N/A'}"></span></p>
                </div>
                <div class="col-md-4 border-start">
                    <h6>Production Info</h6>
                    <p><strong>Truck No:</strong> <span th:text="${order.deliveryTruckNumber ?: 'N/A'}"></span></p>
                    <p><strong>Sheets Used:</strong> <span th:text="${order.totalSheetsRequired ?: '0'}"></span></p>
                </div>
            </div>
        </div>

        <div class="card p-4 mx-auto shadow-sm" style="max-width: 500px;">
            <form th:action="@{/accounts/invoice}" th:object="${accounts}" method="post">
                <input type="hidden" name="orderId" th:value="${order.id}">
                <input type="hidden" id="orderQuantity" th:value="${order.quantity}">
                
                <div class="mb-3">
                    <label class="form-label">Bill/Invoice Number</label>
                    <input type="text" class="form-control form-control-lg border-primary" th:field="*{billNumber}" required placeholder="Enter Bill No.">
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Final Rate (Per Unit)</label>
                        <input type="number" step="0.01" class="form-control" id="rateInput" th:field="*{rate}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Total Amount</label>
                        <input type="number" step="0.01" class="form-control bg-light" id="totalAmountDisplay" readonly>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Payment Status</label>
                    <select th:field="*{paymentStatus}" class="form-select">
                        <option value="PENDING">Pending</option>
                        <option value="PAID">Paid</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold">GENERATE BILL & COMPLETE ORDER</button>
            </form>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const rateInput = document.getElementById('rateInput');
        const qtyField = document.getElementById('orderQuantity');
        const totalAmountDisplay = document.getElementById('totalAmountDisplay');
        
        function calculateTotal() {
            const rate = parseFloat(rateInput.value) || 0;
            const qty = parseFloat(qtyField.value) || 0;
            totalAmountDisplay.value = (rate * qty).toFixed(2);
        }
        
        rateInput.addEventListener('input', calculateTotal);
        calculateTotal();
    });
</script>
</body>
</html>
