<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4">Products Catalog</h2>
        <div class="card p-4">
            <div class="d-flex justify-content-end mb-3">
                <a href="/gm/products/new" class="btn btn-primary">+ Add New Product</a>
            </div>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Client ID</th><th>Client Name</th><th>Rate</th><th>Dimensions</th><th>Sheet Size</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.client != null ? product.client.id : 'N/A'}"></td>
                        <td th:text="${product.client != null ? product.client.name : 'N/A'}"></td>
                        <td th:text="${product.ratePerUnit}"></td>
                        <td th:text="${product.dimensions}"></td>
                        <td th:text="${product.sheetSize}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
