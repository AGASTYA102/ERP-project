<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Product - Nexus ERP')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content">
        <h2 class="mb-4">Add New Product</h2>
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <form th:action="@{/gm/products/save(source=${source})}" th:object="${product}" method="post">
                <div class="mb-3">
                    <label class="form-label">Client</label>
                    <select class="form-select" th:field="*{client.id}" required>
                        <option value="" disabled selected>Select Client...</option>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('client.id')}" th:errors="*{client.id}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3 row">
                    <div class="col"><label>Rate/Unit</label><input type="number" step="0.01" class="form-control" th:field="*{ratePerUnit}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ratePerUnit')}" th:errors="*{ratePerUnit}"></div>
                    </div>
                    <div class="col"><label>UPS</label><input type="number" class="form-control" th:field="*{ups}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ups')}" th:errors="*{ups}"></div>
                    </div>
                </div>
                <div class="mb-3 row">
                    <div class="col"><label>Dimensions</label><input type="text" class="form-control" th:field="*{dimensions}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dimensions')}" th:errors="*{dimensions}"></div>
                    </div>
                    <div class="col"><label>Sheet Size</label><input type="text" class="form-control" th:field="*{sheetSize}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('sheetSize')}" th:errors="*{sheetSize}"></div>
                    </div>
                </div>
                <div class="mb-3 row">
                    <div class="col"><label>Die No</label><input type="text" class="form-control" th:field="*{dieNo}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dieNo')}" th:errors="*{dieNo}"></div>
                    </div>
                    <div class="col"><label>Plate ID</label><input type="text" class="form-control" th:field="*{plateId}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('plateId')}" th:errors="*{plateId}"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label>Spec</label><textarea class="form-control" th:field="*{materialSpecs}"></textarea>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('materialSpecs')}" th:errors="*{materialSpecs}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Product</button>
            </form>
        </div>
    </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
