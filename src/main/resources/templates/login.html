<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - Nexus ERP')}"></head>
<body style="background-color: #1a1b26; display: flex; align-items: center; justify-content: center; height: 100vh;">

<div class="card" style="width: 400px; padding: 2rem;">
    <h2 class="text-center mb-4" style="color: #7aa2f7; font-weight: 800;">NEXUS ERP</h2>
    
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Select User</label>
            <select class="form-control" id="username" name="username" required autofocus>
                <option value="gm">General Manager (gm)</option>
                <option value="designer">Designer (designer)</option>
                <option value="purchase">Purchase Manager (purchase)</option>
                <option value="production">Production Manager (production)</option>
                <option value="accounts">Accounts (accounts)</option>
            </select>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
    </form>
</div>

</body>
</html>
